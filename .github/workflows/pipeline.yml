name: Model Validation and Deployment Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────
  # JOB 1: VALIDATE
  # ─────────────────────────────────────────────
  validate:
    name: Train & Validate Model
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install mlflow scikit-learn pandas numpy dvc

      - name: Pull data with DVC
        env:
          # Add your DVC remote credentials as secrets if needed
          # e.g. AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: |
          # If no DVC remote is configured, this gracefully skips
          dvc pull --no-run-cache 2>/dev/null || echo "DVC pull skipped (no remote or no tracked files)"

      - name: Train model and log to MLflow
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: python train.py

      - name: Upload model_info artifact
        uses: actions/upload-artifact@v4
        with:
          name: model-info
          path: model_info.txt
          retention-days: 1

  # ─────────────────────────────────────────────
  # JOB 2: DEPLOY
  # ─────────────────────────────────────────────
  deploy:
    name: Check Threshold & Deploy
    runs-on: ubuntu-latest
    needs: validate          # only runs if validate succeeds

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install mlflow scikit-learn pandas numpy

      - name: Download model_info artifact
        uses: actions/download-artifact@v4
        with:
          name: model-info

      - name: Check Threshold
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
        run: python check_threshold.py

      - name: Mock Docker Build
        run: |
          RUN_ID=$(cat model_info.txt)
          echo "Accuracy threshold passed!"
          echo "Building Docker image for Run ID: ${RUN_ID}"
          docker build --build-arg RUN_ID="${RUN_ID}" -t model-serving:${RUN_ID} .
          echo "🐳 Docker image model-serving:${RUN_ID} built successfully."
